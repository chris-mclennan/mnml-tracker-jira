[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "msi"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "aarch64-pc-windows-msvc", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Which actions to run on pull requests
pr-run-mode = "upload"
# YAML snippet injected into every build job's `steps:` array,
# *before* the build runs. Used to check out the sibling repos
# this crate references by path (`../tmnl-protocol`). Lives at
# `.github/build-setup.yml` so GitHub doesn't try to interpret it
# as a standalone workflow.
github-build-setup = "../build-setup.yml"
# Permit manual edits to the generated CI file — `dist plan` would
# otherwise refuse to run when release.yml drifts. We hand-add the
# sibling-clone step to the plan job (cargo-dist only auto-injects
# `github-build-setup` into build-local-artifacts), so the file is
# intentionally out of sync.
allow-dirty = ["ci"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

# Build aarch64-pc-windows-msvc on the native `windows-11-arm`
# runner (GA'd 2026-01-29, free in public repos at 4 vCPU).
[dist.github-custom-runners]
aarch64-pc-windows-msvc = "windows-11-arm"
